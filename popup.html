<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d1a;
      --surface:      #14142a;
      --surface-2:    #1c1c36;
      --border:       #22223a;
      --accent:       #6264a7;
      --accent-glow:  #6264a740;
      --accent-light: #8b8dce;
      --text:         #dde0f5;
      --muted:        #6a6d96;
      --success:      #3dd68c;
      --success-glow: #3dd68c40;
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #161630 0%, #1a1838 100%);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .header-text { flex: 1; min-width: 0; }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .01em;
    }
    .header-subtitle {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      border: 1px solid transparent;
      transition: all .3s;
    }
    .status-pill.on {
      background: var(--success-glow);
      border-color: #3dd68c55;
      color: var(--success);
    }
    .status-pill.off {
      background: #1e1e38;
      border-color: var(--border);
      color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-pill.on .status-dot {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ── Cards ── */
    .card {
      margin: 10px 12px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .card:last-of-type { margin-bottom: 0; }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
    }

    .card-label { font-size: 14px; font-weight: 500; }
    .card-meta  { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .card-sep {
      height: 1px;
      background: var(--border);
      margin: 0 14px;
    }

    /* ── Toggles ── */
    .toggle { position: relative; flex-shrink: 0; }
    .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }

    .toggle-track {
      display: block;
      background: var(--surface-2);
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
      position: relative;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
      transition: transform .2s;
    }
    .toggle input:checked ~ .toggle-track { background: var(--accent); }

    /* sizes */
    .toggle.lg .toggle-track { width: 44px; height: 26px; }
    .toggle.lg .toggle-track::after { width: 20px; height: 20px; top: 3px; left: 3px; }
    .toggle.lg input:checked ~ .toggle-track::after { transform: translateX(18px); }

    .toggle.md .toggle-track { width: 36px; height: 20px; }
    .toggle.md .toggle-track::after { width: 14px; height: 14px; top: 3px; left: 3px; }
    .toggle.md input:checked ~ .toggle-track::after { transform: translateX(16px); }

    .toggle.sm .toggle-track { width: 28px; height: 16px; }
    .toggle.sm .toggle-track::after { width: 10px; height: 10px; top: 3px; left: 3px; }
    .toggle.sm input:checked ~ .toggle-track::after { transform: translateX(12px); }

    /* ── Days grid ── */
    .days-body { padding: 6px 10px 12px; }

    .col-headers {
      display: grid;
      grid-template-columns: 34px 28px 1fr 1fr;
      gap: 0 8px;
      padding: 0 6px 4px;
    }
    .col-headers span {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .day-row {
      display: grid;
      grid-template-columns: 34px 28px 1fr 1fr;
      gap: 0 8px;
      align-items: center;
      padding: 5px 6px;
      border-radius: 8px;
      transition: background .15s;
      cursor: default;
    }
    .day-row:hover { background: var(--surface-2); }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      transition: color .2s;
    }
    .day-row.day-on .day-name { color: var(--text); }

    input[type="time"] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 11px;
      padding: 5px 4px;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, opacity .2s;
      -webkit-appearance: none;
    }
    input[type="time"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    input[type="time"]:disabled {
      opacity: .2;
      cursor: default;
    }

    .hint {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      opacity: .7;
    }

    /* ── Footer ── */
    .footer { padding: 12px; }

    #save {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    #save:hover  { opacity: .88; }
    #save:active { transform: scale(.97); }

    #save-status {
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      color: var(--success);
      min-height: 14px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <div class="header-title">Teams Keep Active</div>
      <div class="header-subtitle">Prevents Away status on Microsoft Teams</div>
    </div>
    <div id="status-pill" class="status-pill off">
      <span class="status-dot"></span>
      <span id="status-label">Off</span>
    </div>
  </div>

  <!-- Enabled card -->
  <div class="card">
    <div class="card-row">
      <div>
        <div class="card-label">Keep Active</div>
        <div class="card-meta">Prevent Teams from setting Away</div>
      </div>
      <label class="toggle lg">
        <input type="checkbox" id="toggle" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- Schedule card -->
  <div class="card">
    <div class="card-row">
      <div>
        <div class="card-label">Schedule</div>
        <div class="card-meta">Limit to specific days &amp; hours</div>
      </div>
      <label class="toggle md">
        <input type="checkbox" id="useSchedule" />
        <span class="toggle-track"></span>
      </label>
    </div>

    <div id="days-wrap" style="display:none">
      <div class="card-sep"></div>
      <div class="days-body">
        <div class="col-headers">
          <span></span><span></span>
          <span>From</span>
          <span>To</span>
        </div>
        <div id="days-grid"></div>
        <p class="hint">Overnight ranges supported (e.g. 22:00 → 06:00)</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="save">Save settings</button>
    <div id="save-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
