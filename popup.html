<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1f1f2e;
      color: #e0e0f0;
      width: 260px;
      padding: 16px;
    }

    h1 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #6668a0;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .row label:first-child { font-size: 14px; }

    .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #3a3a5c;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    input:checked + .slider { background: #6264a7; }
    input:checked + .slider::before { transform: translateX(16px); }

    hr {
      border: none;
      border-top: 1px solid #2a2a40;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #6668a0;
      margin-bottom: 12px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 8px;
    }

    .time-grid span {
      font-size: 13px;
      color: #9b9bc8;
    }

    input[type="time"] {
      background: #2a2a40;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      color: #e0e0f0;
      font-size: 14px;
      padding: 5px 8px;
      cursor: pointer;
      width: 100%;
    }
    input[type="time"]:focus {
      outline: none;
      border-color: #6264a7;
    }
    input[type="time"]:disabled {
      opacity: .35;
      cursor: default;
    }

    .hint {
      font-size: 11px;
      color: #6668a0;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 9px;
      background: #6264a7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #7b7dc8; }

    #status {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      color: #6264a7;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Teams Keep Active</h1>

  <div class="row">
    <label for="toggle">Enabled</label>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <hr />

  <h2>Active Hours</h2>

  <div class="row">
    <label for="useSchedule">Limit to a time range</label>
    <label class="switch">
      <input type="checkbox" id="useSchedule" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="time-grid">
    <span>From</span>
    <input type="time" id="startTime" value="09:00" disabled />
    <span>To</span>
    <input type="time" id="endTime" value="18:00" disabled />
  </div>

  <p class="hint">Overnight ranges are supported (e.g. 22:00 – 06:00).</p>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
